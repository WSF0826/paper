<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文庫 ArticleVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root {
    --ink:       #1a1a2e;
    --ink-soft:  #3d3d5c;
    --ink-muted: #7a7a9a;
    --paper:     #f7f6f2;
    --paper-2:   #efede7;
    --paper-3:   #e5e2d9;
    --accent:    #5c4de8;
    --accent-2:  #8b7cf8;
    --accent-bg: #ede9ff;
    --gold:      #c9a84c;
    --danger:    #e05a5a;
    --success:   #4caf7d;
    --border:    rgba(26,26,46,0.10);
    --shadow-sm: 0 1px 4px rgba(26,26,46,0.08);
    --shadow-md: 0 4px 20px rgba(26,26,46,0.12);
    --shadow-lg: 0 12px 40px rgba(26,26,46,0.18);
    --r:         10px;
    --r-sm:      6px;
    --sidebar-w: 240px;
    --topbar-h:  56px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Noto Serif TC', sans-serif;
    background: var(--paper);
    color: var(--ink);
    display: flex;
    height: 100vh;
    overflow: hidden;
    font-size: 14px;
  }

  /* ── SIDEBAR ─────────────────────────── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--ink);
    color: var(--paper);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    z-index: 10;
  }

  #sidebar-logo {
    padding: 20px 18px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  #sidebar-logo .logo-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: #fff;
  }
  #sidebar-logo .logo-sub {
    font-size: 10px;
    color: var(--ink-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  #sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }

  .nav-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-muted);
    padding: 12px 18px 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 18px;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.15s;
    font-size: 13.5px;
    color: rgba(255,255,255,0.72);
    user-select: none;
    position: relative;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .nav-item.active {
    background: rgba(92,77,232,0.28);
    color: #fff;
  }
  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 4px; bottom: 4px;
    width: 3px;
    background: var(--accent-2);
    border-radius: 0 3px 3px 0;
  }
  .nav-item .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
  .nav-item .nav-count {
    margin-left: auto;
    font-size: 10px;
    background: rgba(255,255,255,0.1);
    padding: 1px 6px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: rgba(255,255,255,0.5);
  }
  .nav-item .nav-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .folder-children { padding-left: 10px; }
  .folder-toggle { cursor: pointer; font-size: 10px; margin-right: 2px; transition: transform 0.15s; display: inline-block; }
  .folder-toggle.open { transform: rotate(90deg); }

  #sidebar-bottom {
    border-top: 1px solid rgba(255,255,255,0.07);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sidebar-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: var(--r-sm);
    font-size: 12.5px; cursor: pointer;
    color: rgba(255,255,255,0.65);
    transition: background 0.15s, color 0.15s;
    border: 1px solid rgba(255,255,255,0.08);
    background: transparent;
  }
  .sidebar-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }

  /* ── MAIN ────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--paper);
  }

  /* ── TOPBAR ──────────────────────────── */
  #topbar {
    height: var(--topbar-h);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 20px;
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 5;
  }

  #topbar-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    white-space: nowrap;
  }

  #search-wrap {
    flex: 1;
    max-width: 420px;
    position: relative;
  }
  #search-input {
    width: 100%;
    padding: 7px 12px 7px 34px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    background: var(--paper-2);
    color: var(--ink);
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  #search-input:focus { border-color: var(--accent); background: #fff; }
  #search-input::placeholder { color: var(--ink-muted); }
  .search-icon {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--ink-muted); font-size: 14px; pointer-events: none;
  }

  .topbar-spacer { flex: 1; }

  #sort-select {
    padding: 6px 10px; border: 1.5px solid var(--border);
    border-radius: var(--r-sm); font-size: 12.5px;
    background: var(--paper-2); color: var(--ink);
    cursor: pointer; outline: none; font-family: inherit;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: var(--r-sm);
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: none; font-family: inherit; transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #4a3cd4; }
  .btn-ghost { background: transparent; color: var(--ink-soft); border: 1.5px solid var(--border); }
  .btn-ghost:hover { background: var(--paper-2); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #c54848; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* ── VIEW TOGGLE ─────────────────────── */
  #view-toggle {
    display: flex; gap: 2px;
    background: var(--paper-2);
    border: 1.5px solid var(--border);
    border-radius: var(--r-sm);
    padding: 2px;
  }
  .vt-btn {
    padding: 4px 8px; border-radius: 4px; cursor: pointer;
    font-size: 14px; border: none; background: transparent;
    color: var(--ink-muted); transition: all 0.15s;
  }
  .vt-btn.active { background: #fff; color: var(--ink); box-shadow: var(--shadow-sm); }

  /* ── CONTENT AREA ────────────────────── */
  #content {
    flex: 1; overflow-y: auto; padding: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--paper-3) transparent;
  }

  /* ── CARDS GRID ──────────────────────── */
  #cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  #cards-grid.list-view {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    padding: 16px;
    cursor: pointer;
    transition: box-shadow 0.18s, border-color 0.18s, transform 0.12s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--accent-2);
    transform: translateY(-1px);
  }
  .card.read { opacity: 0.6; }
  .card-status-dot {
    position: absolute; top: 12px; right: 12px;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
  }
  .card.read .card-status-dot { background: var(--paper-3); }
  .card.starred .card-status-dot { background: var(--gold); }

  .card-folder-badge {
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.05em;
    color: var(--accent); text-transform: uppercase;
    display: flex; align-items: center; gap: 4px;
  }

  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 14.5px; font-weight: 700;
    color: var(--ink);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-desc {
    font-size: 12.5px; color: var(--ink-muted);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-tags {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-top: 2px;
  }
  .tag {
    font-size: 10.5px; padding: 2px 8px;
    border-radius: 20px; font-weight: 500;
    background: var(--accent-bg); color: var(--accent);
    cursor: pointer; transition: background 0.12s;
    white-space: nowrap;
  }
  .tag:hover { background: var(--accent); color: #fff; }
  .tag.active-tag { background: var(--accent); color: #fff; }

  .card-meta {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--ink-muted);
    margin-top: auto; padding-top: 6px;
    border-top: 1px solid var(--border);
  }
  .card-domain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 120px;
  }
  .card-date { margin-left: auto; white-space: nowrap; }
  .card-actions {
    display: flex; gap: 4px;
  }
  .card-action-btn {
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; cursor: pointer; border: none;
    background: transparent; font-size: 13px;
    color: var(--ink-muted); transition: background 0.12s, color 0.12s;
  }
  .card-action-btn:hover { background: var(--paper-2); color: var(--ink); }
  .card-action-btn.starred { color: var(--gold); }

  /* LIST VIEW CARD */
  #cards-grid.list-view .card {
    flex-direction: row;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
  }
  #cards-grid.list-view .card-body { flex: 1; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  #cards-grid.list-view .card-title { font-size: 13.5px; -webkit-line-clamp: 1; }
  #cards-grid.list-view .card-desc { display: none; }
  #cards-grid.list-view .card-tags { gap: 3px; }
  #cards-grid.list-view .card-meta { border-top: none; padding-top: 0; margin-top: 0; }
  #cards-grid.list-view .card-status-dot { top: 50%; transform: translateY(-50%); right: auto; left: 10px; position: static; flex-shrink: 0; }

  /* ── EMPTY STATE ──────────────────────── */
  #empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 60vh; gap: 14px;
    color: var(--ink-muted);
  }
  #empty-state .empty-icon { font-size: 52px; opacity: 0.3; }
  #empty-state p { font-size: 14px; }

  /* ── STATS BAR ───────────────────────── */
  #stats-bar {
    display: flex; gap: 16px; padding: 0 20px 14px;
    font-size: 12px; color: var(--ink-muted);
    align-items: center;
  }
  .stat-item { display: flex; align-items: center; gap: 4px; }
  .stat-num { font-weight: 600; color: var(--ink); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  /* ── MODAL ───────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,20,0.55);
    backdrop-filter: blur(3px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: #fff;
    border-radius: 14px;
    padding: 28px;
    width: 540px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    transform: translateY(10px) scale(0.98);
    transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px; font-weight: 700;
    margin-bottom: 20px; color: var(--ink);
    display: flex; align-items: center; gap: 8px;
  }

  .form-row { display: flex; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; flex: 1; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--ink-soft); letter-spacing: 0.04em; text-transform: uppercase; }
  .form-input, .form-textarea, .form-select {
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--r-sm);
    font-size: 13.5px; color: var(--ink);
    background: var(--paper);
    outline: none; font-family: inherit;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); background: #fff; }
  .form-textarea { resize: vertical; min-height: 72px; }

  .tag-input-wrap {
    display: flex; flex-wrap: wrap; gap: 5px;
    padding: 7px 10px;
    border: 1.5px solid var(--border);
    border-radius: var(--r-sm);
    background: var(--paper);
    min-height: 42px;
    cursor: text;
    transition: border-color 0.15s;
  }
  .tag-input-wrap:focus-within { border-color: var(--accent); background: #fff; }
  .tag-input-wrap .tag { cursor: default; }
  .tag-input-wrap .tag .tag-remove { margin-left: 4px; cursor: pointer; opacity: 0.6; }
  .tag-input-wrap .tag .tag-remove:hover { opacity: 1; }
  #tag-input-field {
    border: none; outline: none; background: transparent;
    font-size: 13px; font-family: inherit; color: var(--ink);
    min-width: 80px; flex: 1;
  }

  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

  /* ── PREVIEW PANEL ───────────────────── */
  #preview-panel {
    position: fixed; inset: 0; z-index: 200;
    background: var(--ink);
    display: flex; flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  #preview-panel.open { transform: translateY(0); }

  #preview-topbar {
    height: 52px;
    display: flex; align-items: center; gap: 12px;
    padding: 0 18px;
    background: rgba(0,0,0,0.4);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  #preview-title {
    flex: 1;
    font-size: 13.5px; font-weight: 500;
    color: rgba(255,255,255,0.8);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #preview-url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: rgba(255,255,255,0.4);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 300px;
  }

  #preview-iframe {
    flex: 1; border: none; background: #fff;
  }

  #preview-blocked {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; color: rgba(255,255,255,0.55);
  }
  #preview-blocked .blocked-icon { font-size: 52px; opacity: 0.3; }
  #preview-blocked h3 { font-size: 18px; color: rgba(255,255,255,0.8); }
  #preview-blocked p { font-size: 13px; text-align: center; max-width: 360px; line-height: 1.6; }

  /* ── FOLDER MANAGE MODAL ─────────────── */
  .folder-list-item {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; border-radius: var(--r-sm);
    margin-bottom: 4px;
    border: 1.5px solid var(--border);
    background: var(--paper);
  }
  .folder-list-item:hover { background: var(--paper-2); }
  .folder-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .folder-list-name { flex: 1; font-size: 13.5px; }
  .folder-list-count { font-size: 11px; color: var(--ink-muted); font-family: 'JetBrains Mono', monospace; }

  /* ── TOAST ───────────────────────────── */
  #toast-container {
    position: fixed; bottom: 24px; right: 24px;
    z-index: 9999;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  .toast {
    background: var(--ink);
    color: #fff;
    padding: 10px 16px;
    border-radius: var(--r-sm);
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    animation: toastIn 0.2s ease;
    border-left: 3px solid var(--accent);
  }
  .toast.success { border-left-color: var(--success); }
  .toast.error { border-left-color: var(--danger); }
  @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

  /* ── COLOR PICKER ────────────────────── */
  .color-opts { display: flex; gap: 6px; flex-wrap: wrap; }
  .color-opt {
    width: 22px; height: 22px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
    transition: transform 0.1s;
  }
  .color-opt:hover { transform: scale(1.15); }
  .color-opt.selected { border-color: var(--ink); }

  /* ── SCROLLBAR GLOBAL ────────────────── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--paper-3); border-radius: 10px; }

  /* ── RESPONSIVE ──────────────────────── */
  @media (max-width: 680px) {
    #sidebar { width: 52px; min-width: 52px; }
    .nav-label, .nav-count, #sidebar-logo .logo-sub, .sidebar-btn span { display: none; }
    #sidebar-logo { padding: 14px 8px; }
    .sidebar-btn { justify-content: center; padding: 8px; }
    #cards-grid { grid-template-columns: 1fr; }
  }

  .highlight { background: #fff3a3; border-radius: 2px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div id="sidebar-logo">
    <div class="logo-title">文庫</div>
    <div class="logo-sub">ArticleVault</div>
  </div>
  <div id="sidebar-nav">
    <div class="nav-section-label">檢視</div>
    <div class="nav-item active" data-filter="all" onclick="setFilter('all',this)">
      <span class="nav-icon">📚</span>
      <span class="nav-label">全部文章</span>
      <span class="nav-count" id="count-all">0</span>
    </div>
    <div class="nav-item" data-filter="unread" onclick="setFilter('unread',this)">
      <span class="nav-icon">🔵</span>
      <span class="nav-label">未讀</span>
      <span class="nav-count" id="count-unread">0</span>
    </div>
    <div class="nav-item" data-filter="starred" onclick="setFilter('starred',this)">
      <span class="nav-icon">⭐</span>
      <span class="nav-label">已收藏</span>
      <span class="nav-count" id="count-starred">0</span>
    </div>
    <div class="nav-item" data-filter="read" onclick="setFilter('read',this)">
      <span class="nav-icon">✅</span>
      <span class="nav-label">已讀</span>
      <span class="nav-count" id="count-read">0</span>
    </div>

    <div class="nav-section-label" style="margin-top:8px;">資料夾</div>
    <div id="folder-nav-list"></div>
  </div>
  <div id="sidebar-bottom">
    <button class="sidebar-btn" onclick="openManageFolders()">📁 <span>管理資料夾</span></button>
    <button class="sidebar-btn" onclick="exportData()">⬆️ <span>匯出 JSON</span></button>
    <button class="sidebar-btn" onclick="triggerImport()">⬇️ <span>匯入 JSON</span></button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</nav>

<!-- MAIN -->
<div id="main">
  <!-- TOPBAR -->
  <div id="topbar">
    <div id="topbar-title">全部文章</div>
    <div id="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="搜尋標題、網址、標籤…" oninput="doSearch(this.value)">
    </div>
    <div class="topbar-spacer"></div>
    <select id="sort-select" onchange="doSort(this.value)">
      <option value="newest">最新收藏</option>
      <option value="oldest">最早收藏</option>
      <option value="title">標題 A→Z</option>
      <option value="unread">未讀優先</option>
    </select>
    <div id="view-toggle">
      <button class="vt-btn active" id="vt-grid" title="格狀" onclick="setView('grid')">⊞</button>
      <button class="vt-btn" id="vt-list" title="列表" onclick="setView('list')">☰</button>
    </div>
    <button class="btn btn-primary" onclick="openAddModal()">＋ 新增文章</button>
  </div>

  <!-- STATS -->
  <div id="stats-bar"></div>

  <!-- CONTENT -->
  <div id="content">
    <div id="cards-grid"></div>
    <div id="empty-state" style="display:none">
      <div class="empty-icon">📭</div>
      <p>這裡還沒有文章</p>
      <button class="btn btn-primary" onclick="openAddModal()">＋ 新增第一篇文章</button>
    </div>
  </div>
</div>

<!-- ── ADD/EDIT MODAL ─────────────────────────── -->
<div class="modal-overlay" id="article-modal" onclick="closeModalIfOuter(event,'article-modal')">
  <div class="modal">
    <div class="modal-title" id="modal-title-text">📎 新增文章</div>

    <div class="form-group">
      <label class="form-label">文章網址 *</label>
      <input type="url" class="form-input" id="f-url" placeholder="https://..." oninput="autoFillTitle()">
    </div>
    <div class="form-group">
      <label class="form-label">標題 *</label>
      <input type="text" class="form-input" id="f-title" placeholder="文章標題">
    </div>
    <div class="form-group">
      <label class="form-label">摘要 / 筆記</label>
      <textarea class="form-textarea" id="f-desc" placeholder="關於這篇文章的摘要或個人筆記…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">資料夾</label>
        <select class="form-select" id="f-folder"></select>
      </div>
      <div class="form-group">
        <label class="form-label">閱讀狀態</label>
        <select class="form-select" id="f-status">
          <option value="unread">🔵 未讀</option>
          <option value="read">✅ 已讀</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">標籤（輸入後按 Enter 或逗號新增）</label>
      <div class="tag-input-wrap" id="tag-input-wrap" onclick="document.getElementById('tag-input-field').focus()">
        <input type="text" id="tag-input-field" placeholder="輸入標籤…"
          onkeydown="handleTagInput(event)" oninput="handleTagAutocomplete(this.value)">
      </div>
      <div id="tag-autocomplete" style="display:none; margin-top:4px; display:flex; gap:4px; flex-wrap:wrap;"></div>
    </div>
    <div class="form-group">
      <label class="form-label" style="display:flex;align-items:center;gap:8px;cursor:pointer;">
        <input type="checkbox" id="f-star" style="width:15px;height:15px;accent-color:var(--accent)">
        加入收藏 ⭐
      </label>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('article-modal')">取消</button>
      <button class="btn btn-primary" onclick="saveArticle()">儲存文章</button>
    </div>
  </div>
</div>

<!-- ── FOLDER MODAL ─────────────────────────── -->
<div class="modal-overlay" id="folder-modal" onclick="closeModalIfOuter(event,'folder-modal')">
  <div class="modal">
    <div class="modal-title">📁 管理資料夾</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">資料夾名稱</label>
        <input type="text" class="form-input" id="new-folder-name" placeholder="例如：技術文章">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">顏色</label>
      <div class="color-opts" id="folder-color-opts">
        <div class="color-opt selected" data-color="#5c4de8" style="background:#5c4de8"></div>
        <div class="color-opt" data-color="#e05a5a" style="background:#e05a5a"></div>
        <div class="color-opt" data-color="#4caf7d" style="background:#4caf7d"></div>
        <div class="color-opt" data-color="#c9a84c" style="background:#c9a84c"></div>
        <div class="color-opt" data-color="#2196c9" style="background:#2196c9"></div>
        <div class="color-opt" data-color="#e08c5a" style="background:#e08c5a"></div>
        <div class="color-opt" data-color="#8b4de8" style="background:#8b4de8"></div>
        <div class="color-opt" data-color="#4caaaf" style="background:#4caaaf"></div>
      </div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="addFolder()" style="margin-bottom:16px">＋ 新增資料夾</button>

    <div id="folder-manage-list"></div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('folder-modal')">關閉</button>
    </div>
  </div>
</div>

<!-- ── PREVIEW PANEL ─────────────────────────── -->
<div id="preview-panel">
  <div id="preview-topbar">
    <button class="btn btn-ghost btn-sm" style="color:#fff;border-color:rgba(255,255,255,0.2);flex-shrink:0" onclick="closePreview()">✕ 關閉</button>
    <div id="preview-title"></div>
    <div id="preview-url"></div>
    <button class="btn btn-ghost btn-sm" id="preview-open-btn" style="color:#fff;border-color:rgba(255,255,255,0.2);flex-shrink:0" onclick="openPreviewInTab()">↗ 開新分頁</button>
    <button class="btn btn-ghost btn-sm" style="color:#fff;border-color:rgba(255,255,255,0.2);flex-shrink:0" onclick="markReadFromPreview()">✅ 標記已讀</button>
  </div>
  <iframe id="preview-iframe" sandbox="allow-scripts allow-same-origin allow-popups allow-forms" onload="handleIframeLoad()" onerror="showPreviewBlocked()"></iframe>
  <div id="preview-blocked" style="display:none">
    <div class="blocked-icon">🚫</div>
    <h3>無法在此預覽</h3>
    <p>此網站不允許被嵌入預覽（X-Frame-Options 限制）。<br>請使用「開新分頁」直接前往原始頁面。</p>
    <button class="btn btn-primary" onclick="openPreviewInTab()">↗ 在新分頁開啟</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════════════
const STORE_KEY = 'articlevault_v1';
let DB = { articles: [], folders: [] };
let currentFilter = 'all';
let currentFolderFilter = null;
let currentTagFilter = null;
let currentSearch = '';
let currentSort = 'newest';
let currentView = 'grid';
let editingId = null;
let currentTagsEdit = [];
let selectedFolderColor = '#5c4de8';
let previewArticleId = null;

function loadDB() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) DB = JSON.parse(raw);
    if (!DB.articles) DB.articles = [];
    if (!DB.folders) DB.folders = [];
    // Default folders
    if (DB.folders.length === 0) {
      DB.folders = [
        { id: uid(), name: '技術文章', color: '#5c4de8' },
        { id: uid(), name: '設計靈感', color: '#e08c5a' },
        { id: uid(), name: '商業閱讀', color: '#4caf7d' },
      ];
      saveDB();
    }
  } catch(e) { console.error(e); }
}

function saveDB() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(DB)); } catch(e) {
    toast('儲存失敗：空間可能已滿', 'error');
  }
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

// ═══════════════════════════════════════════════════
// FILTER & RENDER
// ═══════════════════════════════════════════════════
function getFiltered() {
  let list = [...DB.articles];

  // Status filter
  if (currentFilter === 'unread') list = list.filter(a => a.status === 'unread');
  else if (currentFilter === 'starred') list = list.filter(a => a.starred);
  else if (currentFilter === 'read') list = list.filter(a => a.status === 'read');

  // Folder filter
  if (currentFolderFilter) list = list.filter(a => a.folderId === currentFolderFilter);

  // Tag filter
  if (currentTagFilter) list = list.filter(a => a.tags && a.tags.includes(currentTagFilter));

  // Search
  if (currentSearch.trim()) {
    const q = currentSearch.toLowerCase();
    list = list.filter(a =>
      (a.title||'').toLowerCase().includes(q) ||
      (a.url||'').toLowerCase().includes(q) ||
      (a.desc||'').toLowerCase().includes(q) ||
      (a.tags||[]).some(t => t.toLowerCase().includes(q))
    );
  }

  // Sort
  if (currentSort === 'newest') list.sort((a,b) => b.createdAt - a.createdAt);
  else if (currentSort === 'oldest') list.sort((a,b) => a.createdAt - b.createdAt);
  else if (currentSort === 'title') list.sort((a,b) => (a.title||'').localeCompare(b.title||'', 'zh-TW'));
  else if (currentSort === 'unread') list.sort((a,b) => {
    const au = a.status === 'unread' ? 0 : 1;
    const bu = b.status === 'unread' ? 0 : 1;
    return au - bu || b.createdAt - a.createdAt;
  });

  return list;
}

function renderAll() {
  renderSidebar();
  renderCards();
  renderStats();
}

function renderCards() {
  const grid = document.getElementById('cards-grid');
  const empty = document.getElementById('empty-state');
  const list = getFiltered();

  if (list.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  const q = currentSearch.trim().toLowerCase();

  grid.innerHTML = list.map(a => {
    const folder = DB.folders.find(f => f.id === a.folderId);
    const domain = getDomain(a.url);
    const dateStr = formatDate(a.createdAt);
    const isStarred = a.starred;
    const isRead = a.status === 'read';

    function hl(str) {
      if (!q || !str) return escHtml(str||'');
      return escHtml(str).replace(new RegExp(escRegex(q),'gi'), m => `<mark class="highlight">${m}</mark>`);
    }

    const tagsHtml = (a.tags||[]).slice(0,5).map(t =>
      `<span class="tag${currentTagFilter===t?' active-tag':''}" onclick="filterTag('${escAttr(t)}',event)">${hl(t)}</span>`
    ).join('');

    return `<div class="card${isRead?' read':''}${isStarred?' starred':''}" onclick="clickCard('${a.id}')">
      <span class="card-status-dot"></span>
      ${folder ? `<div class="card-folder-badge"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${folder.color};margin-right:4px"></span>${escHtml(folder.name)}</div>` : ''}
      <div class="card-title">${hl(a.title||'（無標題）')}</div>
      ${a.desc ? `<div class="card-desc">${hl(a.desc)}</div>` : ''}
      ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
      <div class="card-meta">
        <span class="card-domain" title="${escAttr(a.url||'')}">🔗 ${escHtml(domain)}</span>
        <span class="card-date">${dateStr}</span>
        <div class="card-actions" onclick="event.stopPropagation()">
          <button class="card-action-btn${isStarred?' starred':''}" title="收藏" onclick="toggleStar('${a.id}')">⭐</button>
          <button class="card-action-btn" title="標記已讀/未讀" onclick="toggleRead('${a.id}')">${isRead?'🔵':'✅'}</button>
          <button class="card-action-btn" title="編輯" onclick="openEditModal('${a.id}')">✏️</button>
          <button class="card-action-btn" title="刪除" onclick="deleteArticle('${a.id}')">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderSidebar() {
  // Counts
  const all = DB.articles.length;
  const unread = DB.articles.filter(a => a.status === 'unread').length;
  const starred = DB.articles.filter(a => a.starred).length;
  const readC = DB.articles.filter(a => a.status === 'read').length;
  document.getElementById('count-all').textContent = all;
  document.getElementById('count-unread').textContent = unread;
  document.getElementById('count-starred').textContent = starred;
  document.getElementById('count-read').textContent = readC;

  // Folders
  const nav = document.getElementById('folder-nav-list');
  nav.innerHTML = DB.folders.map(f => {
    const cnt = DB.articles.filter(a => a.folderId === f.id).length;
    const isActive = currentFolderFilter === f.id;
    return `<div class="nav-item${isActive?' active':''}" onclick="setFolderFilter('${f.id}',this)">
      <span class="nav-icon" style="color:${f.color}">📁</span>
      <span class="nav-label">${escHtml(f.name)}</span>
      <span class="nav-count">${cnt}</span>
    </div>`;
  }).join('');
}

function renderStats() {
  const list = getFiltered();
  const total = DB.articles.length;
  const bar = document.getElementById('stats-bar');
  bar.innerHTML = `
    <span class="stat-item">顯示 <span class="stat-num">${list.length}</span></span>
    <span class="stat-item">共 <span class="stat-num">${total}</span> 篇</span>
    <span class="stat-item">未讀 <span class="stat-num">${DB.articles.filter(a=>a.status==='unread').length}</span></span>
    ${currentTagFilter ? `<span class="stat-item">🏷 標籤：<span class="stat-num">${escHtml(currentTagFilter)}</span> <button class="btn btn-ghost btn-sm" onclick="filterTag(null)" style="padding:2px 6px;font-size:11px">✕</button></span>` : ''}
  `;
}

// ═══════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════
function setFilter(type, el) {
  currentFilter = type;
  currentFolderFilter = null;
  currentTagFilter = null;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  const labels = { all: '全部文章', unread: '未讀', starred: '已收藏', read: '已讀' };
  document.getElementById('topbar-title').textContent = labels[type] || type;
  renderAll();
}

function setFolderFilter(folderId, el) {
  currentFilter = 'all';
  currentFolderFilter = folderId;
  currentTagFilter = null;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  const f = DB.folders.find(f => f.id === folderId);
  document.getElementById('topbar-title').textContent = f ? f.name : '資料夾';
  renderAll();
}

function filterTag(tag, e) {
  if (e) e.stopPropagation();
  currentTagFilter = currentTagFilter === tag ? null : tag;
  renderAll();
}

function doSearch(val) {
  currentSearch = val;
  renderCards();
  renderStats();
}

function doSort(val) {
  currentSort = val;
  renderCards();
}

function setView(v) {
  currentView = v;
  const grid = document.getElementById('cards-grid');
  grid.classList.toggle('list-view', v === 'list');
  document.getElementById('vt-grid').classList.toggle('active', v === 'grid');
  document.getElementById('vt-list').classList.toggle('active', v === 'list');
}

// ═══════════════════════════════════════════════════
// CARD ACTIONS
// ═══════════════════════════════════════════════════
function clickCard(id) {
  const a = DB.articles.find(x => x.id === id);
  if (!a) return;
  openPreview(a);
}

function toggleStar(id) {
  const a = DB.articles.find(x => x.id === id);
  if (!a) return;
  a.starred = !a.starred;
  saveDB(); renderCards();
  toast(a.starred ? '已加入收藏 ⭐' : '已取消收藏', 'success');
}

function toggleRead(id) {
  const a = DB.articles.find(x => x.id === id);
  if (!a) return;
  a.status = a.status === 'read' ? 'unread' : 'read';
  saveDB(); renderAll();
}

function deleteArticle(id) {
  if (!confirm('確定要刪除這篇文章嗎？')) return;
  DB.articles = DB.articles.filter(x => x.id !== id);
  saveDB(); renderAll();
  toast('已刪除', 'success');
}

// ═══════════════════════════════════════════════════
// ADD / EDIT MODAL
// ═══════════════════════════════════════════════════
function openAddModal() {
  editingId = null;
  currentTagsEdit = [];
  document.getElementById('modal-title-text').textContent = '📎 新增文章';
  document.getElementById('f-url').value = '';
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-status').value = 'unread';
  document.getElementById('f-star').checked = false;
  populateFolderSelect();
  renderTagsInModal([]);
  openModal('article-modal');
}

function openEditModal(id) {
  const a = DB.articles.find(x => x.id === id);
  if (!a) return;
  editingId = id;
  currentTagsEdit = [...(a.tags||[])];
  document.getElementById('modal-title-text').textContent = '✏️ 編輯文章';
  document.getElementById('f-url').value = a.url || '';
  document.getElementById('f-title').value = a.title || '';
  document.getElementById('f-desc').value = a.desc || '';
  document.getElementById('f-status').value = a.status || 'unread';
  document.getElementById('f-star').checked = !!a.starred;
  populateFolderSelect(a.folderId);
  renderTagsInModal(currentTagsEdit);
  openModal('article-modal');
}

function populateFolderSelect(selectedId) {
  const sel = document.getElementById('f-folder');
  sel.innerHTML = `<option value="">（不分類）</option>` +
    DB.folders.map(f => `<option value="${f.id}"${f.id===selectedId?' selected':''}>${escHtml(f.name)}</option>`).join('');
}

function autoFillTitle() {
  const url = document.getElementById('f-url').value.trim();
  const titleEl = document.getElementById('f-title');
  if (url && !titleEl.value && url.startsWith('http')) {
    try {
      const domain = new URL(url).hostname.replace('www.','');
      titleEl.placeholder = `來自 ${domain} 的文章（請填寫標題）`;
    } catch(e) {}
  }
}

function saveArticle() {
  const url = document.getElementById('f-url').value.trim();
  const title = document.getElementById('f-title').value.trim();
  if (!url) { toast('請填寫網址', 'error'); return; }
  if (!title) { toast('請填寫標題', 'error'); return; }

  const article = {
    id: editingId || uid(),
    url,
    title,
    desc: document.getElementById('f-desc').value.trim(),
    folderId: document.getElementById('f-folder').value || null,
    status: document.getElementById('f-status').value,
    starred: document.getElementById('f-star').checked,
    tags: [...currentTagsEdit],
    createdAt: editingId ? (DB.articles.find(x=>x.id===editingId)||{}).createdAt || Date.now() : Date.now(),
    updatedAt: Date.now(),
  };

  if (editingId) {
    const idx = DB.articles.findIndex(x => x.id === editingId);
    if (idx >= 0) DB.articles[idx] = article;
  } else {
    DB.articles.unshift(article);
  }

  saveDB();
  closeModal('article-modal');
  renderAll();
  toast(editingId ? '已更新 ✅' : '文章已新增 ✅', 'success');
}

// ═══════════════════════════════════════════════════
// TAG INPUT
// ═══════════════════════════════════════════════════
function renderTagsInModal(tags) {
  const wrap = document.getElementById('tag-input-wrap');
  const field = document.getElementById('tag-input-field');
  // Remove existing tag spans
  wrap.querySelectorAll('.tag').forEach(t => t.remove());
  tags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.innerHTML = `${escHtml(t)} <span class="tag-remove" onclick="removeTag('${escAttr(t)}')">×</span>`;
    wrap.insertBefore(span, field);
  });
}

function handleTagInput(e) {
  const field = document.getElementById('tag-input-field');
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    addTagFromInput();
  } else if (e.key === 'Backspace' && field.value === '' && currentTagsEdit.length > 0) {
    removeTag(currentTagsEdit[currentTagsEdit.length - 1]);
  }
}

function addTagFromInput() {
  const field = document.getElementById('tag-input-field');
  const val = field.value.trim().replace(/,/g,'');
  if (!val) return;
  if (!currentTagsEdit.includes(val)) {
    currentTagsEdit.push(val);
    renderTagsInModal(currentTagsEdit);
  }
  field.value = '';
  document.getElementById('tag-autocomplete').style.display = 'none';
}

function removeTag(tag) {
  currentTagsEdit = currentTagsEdit.filter(t => t !== tag);
  renderTagsInModal(currentTagsEdit);
}

function handleTagAutocomplete(val) {
  const ac = document.getElementById('tag-autocomplete');
  if (!val.trim()) { ac.style.display = 'none'; return; }
  // All existing tags from all articles
  const allTags = [...new Set(DB.articles.flatMap(a => a.tags||[]))];
  const matches = allTags.filter(t => t.toLowerCase().includes(val.toLowerCase()) && !currentTagsEdit.includes(t));
  if (matches.length === 0) { ac.style.display = 'none'; return; }
  ac.style.display = 'flex';
  ac.innerHTML = matches.slice(0,8).map(t =>
    `<span class="tag" style="cursor:pointer" onclick="pickAutocompleteTag('${escAttr(t)}')">${escHtml(t)}</span>`
  ).join('');
}

function pickAutocompleteTag(t) {
  if (!currentTagsEdit.includes(t)) {
    currentTagsEdit.push(t);
    renderTagsInModal(currentTagsEdit);
  }
  document.getElementById('tag-input-field').value = '';
  document.getElementById('tag-autocomplete').style.display = 'none';
}

// ═══════════════════════════════════════════════════
// FOLDER MANAGE
// ═══════════════════════════════════════════════════
function openManageFolders() {
  renderFolderManageList();
  openModal('folder-modal');
}

function renderFolderManageList() {
  const el = document.getElementById('folder-manage-list');
  el.innerHTML = DB.folders.map(f => {
    const cnt = DB.articles.filter(a => a.folderId === f.id).length;
    return `<div class="folder-list-item">
      <div class="folder-color-dot" style="background:${f.color}"></div>
      <div class="folder-list-name">${escHtml(f.name)}</div>
      <div class="folder-list-count">${cnt} 篇</div>
      <button class="btn btn-ghost btn-sm" onclick="deleteFolder('${f.id}')">刪除</button>
    </div>`;
  }).join('') || '<div style="color:var(--ink-muted);font-size:13px;padding:8px 0">尚未建立資料夾</div>';
}

function addFolder() {
  if (DB.folders.length >= 20) { toast('最多可建立 20 個資料夾', 'error'); return; }
  const name = document.getElementById('new-folder-name').value.trim();
  if (!name) { toast('請輸入資料夾名稱', 'error'); return; }
  if (DB.folders.find(f => f.name === name)) { toast('已有同名資料夾', 'error'); return; }
  DB.folders.push({ id: uid(), name, color: selectedFolderColor });
  document.getElementById('new-folder-name').value = '';
  saveDB();
  renderFolderManageList();
  renderSidebar();
  toast(`資料夾「${name}」已建立 ✅`, 'success');
}

function deleteFolder(id) {
  const cnt = DB.articles.filter(a => a.folderId === id).length;
  if (cnt > 0 && !confirm(`此資料夾有 ${cnt} 篇文章，刪除後文章將變為未分類。確定？`)) return;
  DB.articles.forEach(a => { if (a.folderId === id) a.folderId = null; });
  DB.folders = DB.folders.filter(f => f.id !== id);
  if (currentFolderFilter === id) { currentFolderFilter = null; currentFilter = 'all'; }
  saveDB();
  renderFolderManageList();
  renderAll();
  toast('資料夾已刪除', 'success');
}

// ═══════════════════════════════════════════════════
// PREVIEW
// ═══════════════════════════════════════════════════
let previewTimeout;

function openPreview(article) {
  previewArticleId = article.id;
  const panel = document.getElementById('preview-panel');
  const iframe = document.getElementById('preview-iframe');
  const blocked = document.getElementById('preview-blocked');
  document.getElementById('preview-title').textContent = article.title || '';
  document.getElementById('preview-url').textContent = article.url || '';

  iframe.style.display = 'block';
  blocked.style.display = 'none';

  // Try loading iframe with a timeout fallback
  clearTimeout(previewTimeout);
  iframe.src = article.url || '';

  previewTimeout = setTimeout(() => {
    // If still loading after 6s, show the blocked message
    // (most blocked sites refuse immediately, but just in case)
  }, 6000);

  panel.classList.add('open');
}

function handleIframeLoad() {
  const iframe = document.getElementById('preview-iframe');
  try {
    // If we can access the content document it's loading fine
    const doc = iframe.contentDocument;
    if (doc && (doc.body === null || doc.body.innerHTML === '')) {
      showPreviewBlocked();
    }
  } catch(e) {
    // Cross-origin — most likely loaded fine, just can't inspect
  }
}

function showPreviewBlocked() {
  document.getElementById('preview-iframe').style.display = 'none';
  document.getElementById('preview-blocked').style.display = 'flex';
}

function closePreview() {
  const panel = document.getElementById('preview-panel');
  panel.classList.remove('open');
  document.getElementById('preview-iframe').src = '';
  previewArticleId = null;
}

function openPreviewInTab() {
  const a = DB.articles.find(x => x.id === previewArticleId);
  if (a) window.open(a.url, '_blank', 'noopener');
}

function markReadFromPreview() {
  if (!previewArticleId) return;
  const a = DB.articles.find(x => x.id === previewArticleId);
  if (!a) return;
  a.status = 'read';
  saveDB(); renderCards();
  toast('已標記為已讀 ✅', 'success');
}

// ═══════════════════════════════════════════════════
// IMPORT / EXPORT
// ═══════════════════════════════════════════════════
function exportData() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `articlevault_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('已匯出 JSON ✅', 'success');
}

function triggerImport() {
  document.getElementById('import-file').click();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.articles || !Array.isArray(data.articles)) throw new Error('格式錯誤');
      const mode = confirm(
        `匯入 ${data.articles.length} 篇文章、${(data.folders||[]).length} 個資料夾。\n\n按「確定」合併到現有資料，按「取消」取消匯入。`
      );
      if (!mode) return;
      // Merge: skip duplicates by id
      const existingIds = new Set(DB.articles.map(a => a.id));
      const newArticles = data.articles.filter(a => !existingIds.has(a.id));
      DB.articles = [...DB.articles, ...newArticles];
      // Merge folders
      if (data.folders) {
        const existingFolderIds = new Set(DB.folders.map(f => f.id));
        const newFolders = data.folders.filter(f => !existingFolderIds.has(f.id));
        DB.folders = [...DB.folders, ...newFolders];
      }
      saveDB(); renderAll();
      toast(`已匯入 ${newArticles.length} 篇新文章 ✅`, 'success');
    } catch(err) {
      toast('匯入失敗：' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// UTILS

function getDomain(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch(e) { return url||''; }
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '剛剛';
  if (diff < 3600000) return `${Math.floor(diff/60000)} 分前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)} 小時前`;
  if (diff < 2592000000) return `${Math.floor(diff/86400000)} 天前`;
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}
function escRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function toast(msg, type='') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ═══════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('preview-panel').classList.contains('open')) { closePreview(); return; }
    if (document.getElementById('article-modal').classList.contains('open')) { closeModal('article-modal'); return; }
    if (document.getElementById('folder-modal').classList.contains('open')) { closeModal('folder-modal'); return; }
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') {
    e.preventDefault();
    openAddModal();
  }
});
